site_name: OpenStatz
site_description: Portfolio analytics for quants — a parity-enforced rebuild of QuantStats.
repo_url: https://github.com/ranaroussi/quantstats
theme:
  name: material
  palette:
    scheme: slate
    primary: blue grey
    accent: blue
  features:
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
nav:
  - Home: index.md
  - Parity contract: parity.md
  - Web app & API: app.md
  - Providers: providers.md
